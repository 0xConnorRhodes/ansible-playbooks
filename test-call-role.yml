---
- hosts: ubuntu-testvm
  gather_facts: no # must disable because ansible user may not be set up yet (see configure_managed_ansible_user)
  tasks:
  - name: "ROLE: configure_managed_ansible_user"
    include_role:
      name: configure_managed_ansible_user
    vars:
      ansible_password: "{{ lookup('community.general.passwordstore', 'sysadmin/temp-server-root') }}"
  - name: who am i
    ansible.builtin.command: whoami
    register: me_who
  - name: Print return information from the previous task
    ansible.builtin.debug:
      var: me_who
  - name: Collect only facts returned by facter
    ansible.builtin.setup: