--- # configure ubuntu test vm
- hosts: ubuntu-testvm

  tasks:
  - name: Add the user 'connor' with a bash shell, appending the group 'sudo'
    become: yes
    ansible.builtin.user:
      name: connor
      shell: /bin/bash
      groups: sudo
      append: yes

#  - name: Upgrade the OS (apt full-upgrade)
#    become: yes
#    apt:
#      update_cache: yes
#      upgrade: full

  - name: Install Packages
    become: yes
    apt:
      pkg:
        - neovim
        - git
      state: latest
      cache_valid_time: 86400

  - name: add git user.name
    become: yes
    community.general.git_config:
      name: user.name
      scope: system
      value: "Connor Rhodes"
  - name: add git user.email
    become: yes
    community.general.git_config:
      name: user.email
      scope: system
      value: "cnnrrhodes@gmail.com"

  - name: copy git private to server
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519
      dest: /home/ansible/.ssh/ansible-controlnode_ed25519
      owner: ansible
      group: ansible
      mode: '0600'
  - name: copy git public key to server connor user
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519.pub
      dest: /home/ansible/.ssh/ansible-controlnode_ed25519.pub
      owner: ansible
      group: ansible
      mode: '0644'
  - name: copy git private key to server root user
    become: yes
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519
      dest: /root/.ssh/ansible-controlnode_ed25519
      owner: root
      group: root
      mode: '0600'
  - name: copy git public key to server root user
    become: yes
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519.pub
      dest: /root/.ssh/ansible-controlnode_ed25519.pub
      owner: root
      group: root
      mode: '0644'
  - name: add github to ssh config
    # copy with only testination will create the file with the supplied content
    ansible.builtin.copy:
      dest: "/home/ansible/.ssh/config" 
      content: |
        Host github.com
            IdentityFile ~/.ssh/ansible-controlnode_ed25519

# set up root dotfiles
  - name: Clone repository
    become: yes
    ansible.builtin.git:
      repo: "git@github.com:connorhodes/dotfiles-ubuntu-testvm.git"
      key_file: "/home/ansible/.ssh/ansible-controlnode_ed25519"
      accept_hostkey: yes
      dest: "/configs"
      bare: true

  - name: Install dotfiles
    become: yes
    shell: |
      set -o pipefail
      # Alias
      shopt -s expand_aliases
      alias config='git --git-dir=/configs --work-tree=/'"
      config config --local status.showUntrackedFiles no
      # Handle existing config
      mkdir -p /tmp/root_dotfiles_backup
      config checkout 2>&1 | egrep "\s+\." | awk {'print $1'} | xargs -I{} dirname {} | awk {'print $1'} | xargs -I{} mkdir -p /tmp/root_dotfiles_backup/{}  # noqa 204
      config checkout 2>&1 | egrep "\s+\." | awk {'print $1'} | xargs -I{} mv {} /tmp/root_dotfiles_backup/{}
      # Install
      config checkout
    args:
      chdir: "/"
      creates: "/.configs"
      executable: /bin/bash
    when: not git_dotfiles_head.stat.exists