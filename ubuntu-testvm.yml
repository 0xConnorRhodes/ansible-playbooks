--- # configure ubuntu test vm

- hosts: ubuntu-testvm

  tasks:
  - name: Add the user 'connor' with a bash shell, appending the group 'sudo'
    become: yes
    ansible.builtin.user:
      name: connor
      shell: /bin/bash
      groups: sudo
      append: yes

  - name: Upgrade the OS (apt full-upgrade)
    become: yes
    apt:
      update_cache: yes
      upgrade: full

  - name: Install Packages
    become: yes
    apt:
      pkg:
        - neovim
        - git
      state: latest
      cache_valid_time: 86400

  # use the ansible module instead
  # configure git
  - name: test git config status
    ansible.builtin.shell: git config --list | grep user.name
    ignore_errors: yes # it will error if output is blank. but that means we want to run git setup commands so ignore the errors and continue
    register: git_output
  - name: Configure git
    when: git_output.stdout != "user.name=Connor Rhodes"
    ansible.builtin.shell: |
      git config --global user.name "Connor Rhodes"
      git config --global user.email "cnnrrhodes@gmail.com"
      exit 0
  - name: copy git private to server
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519
      dest: /home/ansible/.ssh/ansible-controlnode_ed25519
      owner: ansible
      group: ansible
      mode: '0600'
  - name: copy git public key to server connor user
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519.pub
      dest: /home/ansible/.ssh/ansible-controlnode_ed25519.pub
      owner: ansible
      group: ansible
      mode: '0644'
  - name: copy git private key to server root user
    become: yes
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519
      dest: /root/.ssh/ansible-controlnode_ed25519
      owner: root
      group: root
      mode: '0600'
  - name: copy git public key to server root user
    become: yes
    ansible.builtin.copy:
      src: /home/ansible/.ssh/ansible-controlnode_ed25519.pub
      dest: /root/.ssh/ansible-controlnode_ed25519.pub
      owner: root
      group: root
      mode: '0644'
  - name: add github to ssh config
    # copy with only testination will create the file with the supplied content
    ansible.builtin.copy:
      dest: "/home/ansible/.ssh/config" 
      content: |
        Host github.com
            IdentityFile ~/.ssh/ansible-controlnode_ed25519
  - name: prepare git configs folder
    become: yes
    ansible.builtin.file:
      path: /configs
      state: directory
      group: connor
      owner: connor
      mode: '0755'
  - name: clone configs repo
    # note that this requires `pipelining = True` to be enabled in ansible.cfg
    become: yes
    become_user: connor
    ansible.builtin.git:
      repo: git@github.com:connorhodes/my_dotfiles.git
      version: ubuntu-testvm
      dest: /configs
      bare: yes

