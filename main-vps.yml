--- # bootstrap main vps
- hosts: main-vps
  gather_facts: no
  tasks:

# CONFIGURE ANSIBLE USER
  - name: "ROLE: configure_managed_ansible_user"
    include_role:
      name: configure_managed_ansible_user
    vars:
      ansible_password: "{{ lookup('community.general.passwordstore', 'sysadmin/temp-server-root') }}"

# CONFIGURE USERS AND LOGIN
  - name: Add the user 'connor' with a bash shell, appending the group 'sudo'
    become: yes
    ansible.builtin.user:
      name: connor
      password: "{{ lookup('community.general.passwordstore', 'sysadmin/main-vps-sudo-user') | password_hash('sha512') }}"
      shell: /bin/bash
      groups: sudo
      append: yes
  - name: Set hostname
    become: yes
    ansible.builtin.hostname:
      name: vps

# INSTALL PACKAGES
  - name: Upgrade the OS (apt full-upgrade)
    become: yes
    apt:
      update_cache: yes
      upgrade: full
  - name: Install Packages
    become: yes
    apt:
      pkg:
        - neovim
        - git
        - unattended-upgrades
        - fail2ban
        - htop
        - rsync
        - curl
        - net-tools # provides route command
      state: latest
      cache_valid_time: 86400

# ENABLE SERVICES
  - name: enable unattended-upgrades
    ansible.builtin.systemd:
      name: unattended-upgrades
      state: started
      enabled: yes
      masked: no
  - name: enable fail2ban
    ansible.builtin.systemd:
      name: fail2ban
      state: started
      enabled: yes
      masked: no

# CLONE AND CHECKOUT CONFIGS
  - name: "ROLE: Clone and Checkout bare_git_repo_configs"
    include_role:
      name: bare_git_repo_configs
    vars:
      sudo_user: "connor" 
      configs_repo: "git@github.com:0xConnorRhodes/configs.main-vps.git"

# set up firewall
  - name: Install firewall
    become: yes
    apt:
      pkg:
        - ufw
      state: latest
      cache_valid_time: 86400
  - name: enable ufw
    become: yes
    ansible.builtin.systemd:
      name: ufw
      state: restarted
      enabled: yes
      masked: no

# configure IP addresses with netplan
  - name: "ROLE: configure networking with netplan"
    include_role: 
      name: mrlesmithjr.netplan
    vars:
      become: yes
      netplan_enabled: true
      netplan_config_file: /etc/netplan/static-ip4-6.yaml
      netplan_configuration:
        network:
          version: 2
          renderer: networkd
          ethernets:
            eth0:
              dhcp4: false
              dhcp6: false
              accept-ra: false
              addresses:
                - "209.141.50.163/24"
                - "2605:6400:0020:0f45::1/64"
              gateway4: "209.141.50.1"
              gateway6: "2605:6400:2:fed5::1"
              nameservers:
                addresses:
                  - 1.0.0.1
                  - 1.1.1.1 
                  - "2606:4700:4700::1001"
                  - "2606:4700:4700::1111"
              routes:
              - to: "2605:6400:2:fed5::1/128"
                scope: link

# proof of concept nginx serving ssg5 markdown landing page
# spin up ansible'd webserver

# BOOTSTRAP NGINX  
  - name: Install nginx Packages
    become: yes
    apt:
      pkg:
        - nginx
        - python3-certbot-nginx
      state: latest
      cache_valid_time: 86400

# REBOOT IF REQUIRED # commented
  - name: "ROLE: reboot if required"
    include_role:
      name: debian_reboot_if_required