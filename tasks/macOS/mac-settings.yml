# OS SETTINGS
- name: show full filepath in finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: _FXShowPosixPathInTitle 
    type: bool
    value: True
    # default = False
    state: present

- name: disable zoom animation when opening a new window of an existing application
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticWindowAnimationsEnabled
    type: bool
    value: False
    # default = True
    state: present

- name: disable desktop icons
  community.general.osx_defaults:
    domain: com.apple.finder
    key: CreateDesktop
    type: string
    value: false
    # default = true
    state: present

- name: disable press and hold function (enable repeat key on hold)
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: False
    # default = True
    state: present

- name: set delay before key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 10
    # default = 15
    state: present

- name: set key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 1
    # default = 2
    state: present

- name: functionally disable dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide-delay
    type: float
    value: 1000
    # for 2 seconds until dock appears, et to 0.3
  register: dock_disable
 
- name: restart dock
  command: killall Dock
  when: dock_disable.changed

# APP SPECIFIC MODS
- name: disable iterm2 animations
  community.general.osx_defaults:
    domain: com.googlecode.iterm2
    key: HotkeyTermAnimationDuration
    type: float
    value: 0.00001
    state: present

- name: force Google Chrome into light mode
  community.general.osx_defaults:
    domain: com.google.Chrome
    key: NSRequiresAquaSystemAppearance
    type: bool
    value: True
    state: present

# CHANGE HOSTNAME AND COMPUTER NAME
# adapted from https://github.com/feffi/ansible-macos-computername
- name: "Get current computer names in macOS"
  become: true
  shell: "scutil --get {{ item }}"
  register: macos_computername_current_names
  changed_when: false
  ignore_errors: true
  failed_when: false
  with_items:
    - "ComputerName"
    - "LocalHostName"
    - "HostName"

# TODO ComputerName is not working. make one shell task to explicitly set each name.

- name: "Setup the computer names in macOS if applicable"
  become: true
  shell: "scutil --set {{ item.item }} {{ macos_computername[item.item] }}"
  with_items: "{{ macos_computername_current_names.results }}"
  when: macos_computername[item.item] is defined and item.stdout != macos_computername[item.item]
